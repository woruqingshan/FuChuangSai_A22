services:
  frontend:
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - ./local/frontend:/app
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE: http://localhost:8000
    networks:
      - a22-net

  edge-backend:
    image: python:3.11-slim-bookworm
    working_dir: /app
    volumes:
      - ./local/edge-backend:/app
      - a22_logs:/logs
      - a22_data:/data
    command: bash -lc "pip install -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      CLOUD_API_BASE: http://host.docker.internal:19000
      LOG_DIR: /logs
      DATA_DIR: /data
    networks:
      - a22-net

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - edge-backend
    networks:
      - a22-net

  gpu-tools:
    image: nvidia/cuda:12.6.3-base-ubuntu22.04
    command: nvidia-smi
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - a22-net
