services:
  frontend:
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - ./local/frontend:/app
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE: http://localhost:8000
    networks:
      - a22-net

  edge-backend:
    image: python:3.11-slim-bookworm
    working_dir: /app
    gpus: all
    volumes:
      - ./local/edge-backend:/app
      - ./shared:/shared
      - /mnt/e/downloads:/external-downloads:ro
      - ./logs:/workspace-logs
      - a22_logs:/logs
      - a22_data:/data
    command: >-
      bash -lc "pip install --no-cache-dir
      --extra-index-url $$PYTORCH_WHEEL_INDEX
      -r requirements.txt
      && uvicorn app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      CLOUD_API_BASE: http://host.docker.internal:19000
      LOG_DIR: /workspace-logs/edge-backend
      DATA_DIR: /data
      LOCAL_ASR_PROVIDER: belle_whisper
      LOCAL_ASR_MODEL: BELLE-2/Belle-whisper-large-v3-turbo-zh
      LOCAL_ASR_MODEL_PATH: /external-downloads/Belle-whisper-large-v3-turbo-zh
      LOCAL_ASR_LANGUAGE: zh
      LOCAL_ASR_DEVICE: cuda:0
      LOCAL_ASR_WARMUP_ENABLED: "true"
      PYTORCH_WHEEL_INDEX: https://download.pytorch.org/whl/cu126
      CUDA_VISIBLE_DEVICES: "0"
    networks:
      - a22-net

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - edge-backend
    networks:
      - a22-net

  gpu-tools:
    image: nvidia/cuda:12.6.3-base-ubuntu22.04
    command: nvidia-smi
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - a22-net
